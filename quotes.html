<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명대사 아카이브 — 공대생 할아버지, 미대생 할머니</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Page hero */
.page-hero{
  background:linear-gradient(135deg,#1A0A2E 0%,#2E1B4E 50%,var(--navy) 100%);
  padding:52px 0;color:#fff;text-align:center;
  border-bottom:3px solid var(--gold);
}
.page-hero h1{color:#fff;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.35)}
.page-hero p{color:rgba(255,255,255,.82);font-size:.96rem}

/* Sort bar */
.sort-bar{
  background:var(--white);border-bottom:2px solid var(--border);
  padding:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.sort-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.sort-label{font-size:.86rem;color:var(--text-sub);font-weight:500}
.sort-label strong{color:var(--terra-dark)}
.sort-btns{display:flex;gap:6px}
.sort-btn{
  padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;
  color:var(--text-light);background:var(--cream-dark);
  border:2px solid var(--border);transition:all .2s;cursor:pointer;min-height:36px;
}
.sort-btn.active,.sort-btn:hover{background:var(--terra);color:#fff;border-color:var(--terra-dark);box-shadow:0 2px 8px rgba(184,85,48,.3)}

/* Quote grid */
.quotes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;padding:36px 0}
@media(max-width:700px){.quotes-grid{grid-template-columns:1fr}}

/* Quote card */
.quote-card{
  background:var(--bg-card);border-radius:var(--radius);
  border:2px solid var(--border-card);padding:30px;
  position:relative;transition:all .25s;
  box-shadow:0 2px 8px var(--shadow);
}
.quote-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px var(--shadow-md);border-color:var(--terra-light)}
.quote-mark{
  font-family:'Noto Serif KR',serif;font-size:4rem;line-height:1;
  color:var(--terra);opacity:.12;position:absolute;top:12px;left:20px;
  font-weight:700;
}
.quote-text{
  font-family:'Noto Serif KR',serif;
  font-size:1.06rem;line-height:1.88;
  color:var(--text);margin-bottom:18px;
  padding-top:18px;
}
.quote-speaker{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.speaker-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;
}
.badge-engineer{
  background:rgba(22,46,74,.1);color:var(--navy);
  border:1px solid rgba(22,46,74,.2);
}
.badge-artist{
  background:rgba(184,85,48,.1);color:var(--terra-dark);
  border:1px solid rgba(184,85,48,.2);
}
.quote-source{font-size:.82rem;color:var(--text-light);margin-bottom:18px;font-weight:500}
.quote-source a{color:var(--terra);text-decoration:underline}
.quote-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:14px;border-top:1px solid var(--border-light);
}
.quote-like-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:20px;
  font-size:.82rem;font-weight:600;
  border:2px solid var(--border-card);
  background:var(--white);color:var(--text-light);
  cursor:pointer;transition:all .2s;min-height:36px;
}
.quote-like-btn:hover,.quote-like-btn.liked{
  background:rgba(212,48,96,.06);border-color:#D43060;color:#D43060;
  box-shadow:0 2px 8px rgba(212,48,96,.2);
}
.quote-share-btn{
  padding:7px 14px;border-radius:20px;
  font-size:.8rem;color:var(--text-light);
  background:var(--cream-dark);border:1.5px solid var(--border);
  cursor:pointer;transition:all .2s;font-weight:500;
}
.quote-share-btn:hover{color:var(--terra);border-color:var(--terra);background:rgba(184,85,48,.06)}

/* Featured quote */
.featured-quote{
  background:linear-gradient(145deg,#0E2440 0%,var(--navy) 60%,var(--navy-mid) 100%);
  border-radius:var(--radius);padding:44px;color:#fff;
  margin-bottom:36px;position:relative;overflow:hidden;
  border:2px solid rgba(255,255,255,.1);
  border-left:5px solid var(--gold);
  box-shadow:0 8px 32px rgba(22,46,74,.45);
}
.featured-quote::before{
  content:'"';font-family:'Noto Serif KR',serif;
  font-size:8rem;color:rgba(255,255,255,.06);
  position:absolute;top:-10px;left:20px;line-height:1;
}
.featured-label{
  font-size:.74rem;font-weight:700;letter-spacing:1.2px;
  margin-bottom:16px;
  color:var(--gold-light);
  display:inline-block;padding:3px 10px;
  background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);
  border-radius:4px;
}
.featured-text{
  font-family:'Noto Serif KR',serif;font-size:1.3rem;
  line-height:1.95;color:rgba(255,255,255,.95);margin-bottom:22px;
  text-shadow:0 1px 4px rgba(0,0,0,.2);
}
.featured-meta{
  font-size:.86rem;color:rgba(255,255,255,.58);
  padding-top:16px;border-top:1px solid rgba(255,255,255,.12);
}

@media(max-width:480px){
  .sort-inner{flex-direction:column;align-items:flex-start}
  .featured-quote{padding:28px 22px}
  .featured-text{font-size:1.1rem}
  .quote-card{padding:22px}
}

</style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="page-hero">
  <div class="container">
    <span class="badge badge-gold" style="margin-bottom:12px">✨ 명대사 아카이브</span>
    <h1>마음에 남는 한 마디</h1>
    <p>공대생 할아버지, 미대생 할머니의 이야기에서 건진 명대사 모음</p>
  </div>
</div>

<div class="sort-bar">
  <div class="container">
    <div class="sort-inner">
      <span class="sort-label">총 <strong id="quoteCount">20</strong>개의 명대사</span>
      <div class="sort-btns">
        <button class="sort-btn active" onclick="sortBy('likes',this)">❤️ 좋아요순</button>
        <button class="sort-btn" onclick="sortBy('latest',this)">🕐 최신순</button>
        <button class="sort-btn" onclick="sortBy('engineer',this)">🔧 공대생</button>
        <button class="sort-btn" onclick="sortBy('artist',this)">🎨 미대생</button>
      </div>
    </div>
  </div>
</div>

<section style="background:var(--cream-dark);padding-bottom:60px">
  <div class="container">
    <!-- Featured Quote -->
    <div class="featured-quote" style="margin-top:36px">
      <p class="featured-label">이 달의 명대사</p>
      <p class="featured-text">
        "나는 항상 왜 그렇게 됐는지를 이해해야 좋아할 수 있어.<br>
        당신은 어떻게 느껴지는지를 먼저 경험하는 사람이잖아.<br>
        그래서 우리가 같이 있으면 세상이 더 완전해지는 거 아닐까?"
      </p>
      <p class="featured-meta">— 공대생 할아버지 (EP.42 · 4부 중년의 봄)</p>
    </div>

    <div class="quotes-grid" id="quotesGrid"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<div id="auth-placeholder"></div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/kakao-share.js"></script>
<script>
const ALL_QUOTES = [
  {id:1, text:'\"20분 늦었어요.\" \"노을이 예뻤어요.\" — 그 순간 그는 처음으로 이해했다. 아, 이 사람은 시간보다 아름다움이 먼저인 사람이구나.', speaker:'engineer', ep:2, epTitle:'20분 늦은 이유', likes:312, date:'2025-08-02'},
  {id:2, text:'\"이건 빨강입니다.\" \"이건 노을색이에요.\" 같은 것을 보면서도 다른 말을 쓰는 사람. 그게 신기했다. 그래서 더 보고 싶었다.', speaker:'engineer', ep:15, epTitle:'색깔 논쟁', likes:287, date:'2025-08-15'},
  {id:3, text:'그는 지도를 보고, 나는 가로수를 봤다. 같은 길을 걸었는데 우리가 본 건 달랐다. 그런데 집에는 같이 돌아왔다.', speaker:'artist', ep:7, epTitle:'첫 산책', likes:256, date:'2025-08-07'},
  {id:4, text:'논리로 해결할 수 없는 게 있다는 걸, 그 사람 덕분에 처음 알았다. 마음은 방정식이 아니니까.', speaker:'engineer', ep:8, epTitle:'첫 오해', likes:234, date:'2025-08-08'},
  {id:5, text:'그가 엑셀로 데이트 계획표를 만들어 왔을 때, 나는 웃었다. 그런데 그 표 안에 내가 좋아하는 것들이 전부 들어 있었다.', speaker:'artist', ep:11, epTitle:'데이트 계획표', likes:221, date:'2025-08-11'},
  {id:6, text:'다른 이유로, 같은 순간에 웃었다. 그게 사랑의 시작인지도 모른다.', speaker:'artist', ep:9, epTitle:'첫 웃음', likes:198, date:'2025-08-09'},
  {id:7, text:'\"왜 예쁜 거야?\" \"그냥 예쁜 거야.\" 그는 이해하려 했고, 나는 느끼고 싶었다. 평생 그 차이로 대화했다.', speaker:'artist', ep:5, epTitle:'다른 질문', likes:189, date:'2025-08-05'},
  {id:8, text:'구도를 계산하는 남자와 순간을 담는 여자. 결국 우리는 같은 사진을 찍고 있었다.', speaker:'engineer', ep:13, epTitle:'사진 찍기', likes:176, date:'2025-08-13'},
  {id:9, text:'이 커피는 에티오피아 예가체프, 산미가 있고, 플로럴 노트가... 그런데 그냥 맛있으면 되는 거 아니에요?', speaker:'artist', ep:3, epTitle:'첫 커피', likes:164, date:'2025-08-03'},
  {id:10, text:'여행은 계획표가 없을 때 시작된다고 했다. 그 말 덕분에 나는 처음으로 길을 잃어봤다. 아름다웠다.', speaker:'engineer', ep:12, epTitle:'여행 계획 사건', likes:156, date:'2025-08-12'},
  {id:11, text:'같은 카페에서 그는 건물 구조를 봤고, 나는 햇살이 떨어지는 방향을 봤다. 우리가 본 세상이 합쳐지면 얼마나 넓을까.', speaker:'artist', ep:14, epTitle:'카페 철학', likes:143, date:'2025-08-14'},
  {id:12, text:'작은 다툼이 큰 차이를 보여줬다. 그리고 더 큰 이해로 이어졌다. 싸움도 번역이 필요하다.', speaker:'engineer', ep:10, epTitle:'첫 싸움', likes:137, date:'2025-08-10'},
  {id:13, text:'같은 질문에 완전히 다른 대답. 그 차이가 처음엔 당황스러웠고, 나중엔 매력이었다.', speaker:'artist', ep:6, epTitle:'다른 대답', likes:128, date:'2025-08-06'},
  {id:14, text:'언어가 달랐다. 그래도 대화는 됐다. 아마 마음이 같았기 때문일 것이다.', speaker:'engineer', ep:4, epTitle:'첫 대화', likes:119, date:'2025-08-04'},
  {id:15, text:'오후 3시의 미술관 앞. 그는 시간을 계산하고 있었고, 나는 빛을 보고 있었다. 그게 우리의 첫 장면이었다.', speaker:'artist', ep:1, epTitle:'미술관 앞에서', likes:112, date:'2025-08-01'},
  {id:16, text:'나는 항상 왜 그렇게 됐는지를 이해해야 좋아할 수 있어. 당신은 어떻게 느껴지는지를 먼저 경험하는 사람이잖아.', speaker:'engineer', ep:42, epTitle:'4부 중년의 봄', likes:298, date:'2025-09-15'},
  {id:17, text:'40년을 함께 살았는데도 당신이 무슨 색을 좋아하는지 아직도 새로 알게 되는 게 있어요.', speaker:'engineer', ep:65, epTitle:'5부 함께 늙기', likes:267, date:'2025-10-01'},
  {id:18, text:'당신은 설명하고 나는 느끼고. 그러면서 우리 사이에 세상이 생겼어요.', speaker:'artist', ep:33, epTitle:'3부 결혼식 전날', likes:243, date:'2025-09-01'},
  {id:19, text:'수식은 항상 같은 답이 나오는데, 당신은 언제나 예상 밖이에요. 그게 좋아요.', speaker:'engineer', ep:27, epTitle:'2부 프로포즈', likes:231, date:'2025-08-28'},
  {id:20, text:'그림을 그리다 보면 어느 순간 생각이 손을 따라가요. 당신 덕분에 말도 그렇게 됐어요.', speaker:'artist', ep:18, epTitle:'2부 첫 여행', likes:205, date:'2025-08-19'},
];

let currentSort = 'likes';
const likedSet = new Set(JSON.parse(localStorage.getItem('likedQuotes') || '[]'));

function sortBy(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuotes();
}

function getSorted() {
  let list = [...ALL_QUOTES];
  if (currentSort === 'likes') list.sort((a,b) => b.likes - a.likes);
  else if (currentSort === 'latest') list.sort((a,b) => b.date.localeCompare(a.date));
  else if (currentSort === 'engineer') list = list.filter(q => q.speaker === 'engineer').sort((a,b) => b.likes - a.likes);
  else if (currentSort === 'artist') list = list.filter(q => q.speaker === 'artist').sort((a,b) => b.likes - a.likes);
  return list;
}

function renderQuotes() {
  const grid = document.getElementById('quotesGrid');
  const sorted = getSorted();
  document.getElementById('quoteCount').textContent = sorted.length;
  grid.innerHTML = sorted.map(quoteCard).join('');
}

function quoteCard(q) {
  const isLiked = likedSet.has(q.id);
  const speakerLabel = q.speaker === 'engineer' ? '🔧 공대생 할아버지' : '🎨 미대생 할머니';
  const speakerClass = q.speaker === 'engineer' ? 'badge-engineer' : 'badge-artist';
  return `
  <div class="quote-card" id="qcard-${q.id}">
    <div class="quote-mark">"</div>
    <p class="quote-text">${q.text}</p>
    <div class="quote-speaker">
      <span class="speaker-badge ${speakerClass}">${speakerLabel}</span>
    </div>
    <p class="quote-source">
      → <a href="episode-detail.html?id=${q.ep}" style="color:var(--terra)">EP.${q.ep} ${q.epTitle}</a>
    </p>
    <div class="quote-card-footer">
      <button class="quote-like-btn ${isLiked ? 'liked' : ''}"
        onclick="toggleLike(${q.id}, this)" id="like-${q.id}">
        ${isLiked ? '❤️' : '🤍'} <span id="lc-${q.id}">${formatNum(q.likes + (isLiked ? 0 : 0))}</span>
      </button>
      <button class="quote-share-btn" onclick="shareQuote(${q.id})">🔗 공유</button>
    </div>
  </div>`;
}

function toggleLike(id, btn) {
  const q = ALL_QUOTES.find(q => q.id === id);
  if (!q) return;
  const isLiked = likedSet.has(id);
  if (isLiked) {
    likedSet.delete(id);
    q.likes--;
    btn.classList.remove('liked');
    btn.innerHTML = `🤍 <span id="lc-${id}">${formatNum(q.likes)}</span>`;
  } else {
    likedSet.add(id);
    q.likes++;
    btn.classList.add('liked');
    btn.innerHTML = `❤️ <span id="lc-${id}">${formatNum(q.likes)}</span>`;
  }
  localStorage.setItem('likedQuotes', JSON.stringify([...likedSet]));
  // Supabase sync
  const sb = getSupabase();
  if (sb && !SUPABASE_URL.includes('YOUR_')) {
    if (isLiked) sb.from('quote_likes').delete().eq('quote_id', id).eq('session_id', getSessionId());
    else sb.from('quote_likes').insert({quote_id: id, session_id: getSessionId()});
  }
}

function shareQuote(id) {
  const q = ALL_QUOTES.find(q => q.id === id);
  if (!q) return;
  kakaoShareQuote({ id: q.id, text: q.text, ep: q.ep, epTitle: q.epTitle });
}

// Supabase load
async function loadFromSupabase() {
  const sb = getSupabase();
  if (!sb || SUPABASE_URL.includes('YOUR_')) return;
  const { data } = await sb.from('quotes').select('*, quote_likes(count)').order('id');
  if (data && data.length > 0) {
    ALL_QUOTES.length = 0;
    data.forEach(q => ALL_QUOTES.push({
      id: q.id, text: q.text, speaker: q.speaker,
      ep: q.episode_number, epTitle: q.episode_title,
      likes: q.quote_likes?.[0]?.count || 0, date: q.created_at
    }));
  }
  renderQuotes();
}

renderQuotes();
loadFromSupabase();
</script>
</body>
</html>
