<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림 이야기 — 공대생 할아버지, 미대생 할머니</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* 페이지 히어로 */
.page-hero{
  background:linear-gradient(135deg,#0E2440 0%,var(--navy) 55%,#5C2A0A 100%);
  padding:52px 0;color:#fff;text-align:center;
  border-bottom:3px solid var(--terra);
}
.page-hero h1{color:#fff;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.page-hero p{color:rgba(255,255,255,.82);font-size:.96rem;max-width:540px;margin:0 auto}

/* 필터 탭 */
.filter-bar{
  background:var(--white);
  border-bottom:2px solid var(--border);
  position:sticky;top:66px;z-index:90;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.filter-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.filter-inner::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:14px 20px;font-size:.86rem;font-weight:600;
  color:var(--text-light);background:none;
  border-bottom:3px solid transparent;
  transition:all .2s;white-space:nowrap;min-height:48px;
}
.filter-btn:hover{color:var(--terra);background:rgba(184,85,48,.05)}
.filter-btn.active{color:var(--terra-dark);border-bottom-color:var(--terra);background:rgba(184,85,48,.06);font-weight:700}
.filter-divider{width:1px;background:var(--border);flex-shrink:0;margin:10px 4px}

/* 갤러리 그리드 */
.gallery-section{background:var(--cream-dark);min-height:60vh;padding:40px 0 64px}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:32px;
}
@media(max-width:760px){.gallery-grid{grid-template-columns:1fr;gap:24px}}

/* 갤러리 카드 */
.gallery-card{
  background:var(--bg-card);
  border-radius:var(--radius);
  border:2px solid var(--border-card);
  overflow:hidden;
  box-shadow:0 2px 10px var(--shadow);
  transition:all .28s;
  cursor:pointer;
}
.gallery-card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 36px var(--shadow-md);
  border-color:var(--terra-light);
}

/* 이미지 영역 */
.gallery-img-wrap{
  width:100%;
  aspect-ratio:16/10;
  overflow:hidden;
  position:relative;
  background:var(--cream-deeper);
}
.gallery-img-wrap img,
.gallery-img-wrap svg{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .45s ease;
  display:block;
}
.gallery-img-wrap svg{height:100%;}
.gallery-card:hover .gallery-img-wrap img{
  transform:scale(1.04);
}
.gallery-img-badge{
  position:absolute;top:14px;left:14px;
  background:rgba(22,46,74,.78);
  color:#fff;font-size:.72rem;font-weight:700;
  padding:5px 11px;border-radius:20px;letter-spacing:.4px;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);
}
.gallery-ep-link{
  position:absolute;bottom:14px;right:14px;
  background:rgba(184,85,48,.88);
  color:#fff;font-size:.75rem;font-weight:700;
  padding:6px 13px;border-radius:20px;
  text-decoration:none;letter-spacing:.3px;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);
  transition:background .2s;
}
.gallery-ep-link:hover{background:var(--terra-dark)}

/* 카드 본문 */
.gallery-card-body{padding:22px 24px 26px}
.gallery-card-title{
  font-size:1.12rem;font-weight:700;color:var(--navy);
  margin-bottom:6px;line-height:1.4;
}
.gallery-card-sub{
  font-size:.78rem;color:var(--text-muted);
  margin-bottom:14px;font-weight:500;letter-spacing:.3px;
}
.gallery-card-desc{
  font-family:'Noto Serif KR',serif;
  font-size:.94rem;line-height:1.95;color:var(--text-sub);
  border-top:1px solid var(--border-light);
  padding-top:14px;
}

/* 라이트박스 */
.lightbox{
  position:fixed;inset:0;z-index:9000;
  background:rgba(10,18,30,.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  padding:20px;
}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox-inner{
  position:relative;max-width:900px;width:100%;
  background:var(--bg-card);border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.94);transition:transform .25s;
}
.lightbox.open .lightbox-inner{transform:scale(1)}
.lightbox-img{width:100%;display:block;max-height:70vh;object-fit:contain;background:var(--cream-deeper)}
.lightbox-svg{width:100%;display:block;max-height:70vh;background:var(--cream-deeper);overflow:hidden}
.lightbox-svg svg{width:100%;height:100%;display:block}
.lightbox-caption{padding:20px 24px 22px}
.lightbox-caption h3{font-size:1.08rem;color:var(--navy);margin-bottom:4px}
.lightbox-caption p{font-size:.88rem;color:var(--text-light);line-height:1.7}
.lightbox-caption .lightbox-ep-link{
  display:inline-block;margin-top:12px;
  padding:8px 18px;background:var(--terra);color:#fff;
  border-radius:20px;font-size:.82rem;font-weight:700;
  text-decoration:none;transition:background .2s;
}
.lightbox-caption .lightbox-ep-link:hover{background:var(--terra-dark)}
.lightbox-close{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;
  font-size:1.1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1.5px solid rgba(255,255,255,.25);
  transition:background .2s;
}
.lightbox-close:hover{background:rgba(0,0,0,.8)}

/* 빈 상태 */
.empty-soon{
  text-align:center;padding:60px 20px;color:var(--text-muted);
}
.empty-soon .empty-icon{font-size:3rem;margin-bottom:16px}
.empty-soon h4{color:var(--navy);margin-bottom:8px}

@media(max-width:480px){
  .gallery-card-body{padding:16px 16px 20px}
  .gallery-card-title{font-size:1rem}
  .gallery-card-desc{font-size:.88rem}
}
</style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="page-hero">
  <div class="container">
    <span class="badge badge-gold" style="margin-bottom:12px">🎨 <span id="totalCount">1</span>점 수록</span>
    <h1>그림 이야기</h1>
    <p>각 에피소드를 위해 만들어진 그림들을 모아 봅니다.<br>논리와 감성이 수채화 한 장 안에 함께 담겼습니다.</p>
  </div>
</div>

<!-- 필터 -->
<div class="filter-bar">
  <div class="container">
    <div class="filter-inner">
      <button class="filter-btn active" data-filter="all"   onclick="filterTag('all',this)">전체</button>
      <button class="filter-btn"        data-filter="cover" onclick="filterTag('cover',this)">표지·메인</button>
      <div class="filter-divider"></div>
      <button class="filter-btn"        data-filter="1"     onclick="filterTag('1',this)">1부 첫만남</button>
      <button class="filter-btn"        data-filter="2"     onclick="filterTag('2',this)">2부 연애</button>
      <button class="filter-btn"        data-filter="3"     onclick="filterTag('3',this)">3부 결혼</button>
      <button class="filter-btn"        data-filter="4"     onclick="filterTag('4',this)">4부 생활</button>
      <button class="filter-btn"        data-filter="5"     onclick="filterTag('5',this)">5부 중년</button>
      <button class="filter-btn"        data-filter="6"     onclick="filterTag('6',this)">6부 노년</button>
    </div>
  </div>
</div>

<!-- 갤러리 본문 -->
<section class="gallery-section">
  <div class="container">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-soon hidden" id="emptyState">
      <div class="empty-icon">🖌️</div>
      <h4>아직 그림 이야기가 없습니다</h4>
      <p id="emptyStateMsg">이 부의 그림 이야기가 곧 연재됩니다.</p>
    </div>
  </div>
</section>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img class="lightbox-img hidden" id="lightboxImg" src="" alt="">
    <div class="lightbox-svg hidden" id="lightboxSvg"></div>
    <div class="lightbox-caption">
      <h3 id="lightboxTitle"></h3>
      <p id="lightboxDesc"></p>
      <a class="lightbox-ep-link hidden" id="lightboxEpLink" href="#">에피소드 읽기 →</a>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="auth-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/common.js"></script>
<script>
// ── 에피소드별 그림 설명 ──
const EP_DESCS = {
  1: '미술관 정문 계단 위, 가을 햇살이 대리석 기둥을 사선으로 가로지르는 오후 3시. 수채화는 차분한 황토와 연보랏빛으로 건물 그림자를 채우고, 두 인물을 화면 왼쪽과 오른쪽 끝에 각각 배치했다. 한 사람은 손목시계에 시선을 고정한 채 반듯하게 서 있고, 다른 사람은 고개를 들어 하늘 어딘가를 바라본다. 두 실루엣 사이의 공백이 이 그림의 핵심이다. 같은 오후, 같은 계단이지만 완전히 다른 세계에 서 있던 두 사람이 처음으로 같은 공간 안에 놓인 순간을 화가는 따뜻한 번짐으로 기록했다. 가을 빛은 두 사람을 동시에 감쌌지만, 그것을 느끼는 방식은 이미 달랐다. 두 세계가 처음 마주친 그 공백은 이 모든 이야기의 시작이었다.',
  2: '노을이 건물 모서리에 날카롭게 걸린 골목 어귀, 오후가 저녁으로 기울어지는 시간. 화면 전체를 주황과 심홍의 층위로 물들인 수채화 안에서 한 사람이 홀로 서 있다. 그를 기다린 자리에는 아직 상대의 잔상이 남아 있다. 20분이라는 숫자는 논리의 언어이고, "노을이 예뻤어요"는 감성의 언어다. 화가는 그 두 언어 사이의 거리를 골목 한복판의 빈 공간으로 표현했다. 서로 이해하지 못한 채 마주 선 두 언어는 그러나 같은 노을빛 아래 있었다. 숫자로 셀 수 없는 것을 보는 눈과, 시간을 정확하게 읽는 눈이 같은 하늘 아래 처음으로 함께 서 있었다. 그것이 둘을 다시 걷게 했고, 이 이야기를 시작하게 했다.',
  3: '카페 내부, 카운터 앞에 나란히 선 두 사람. 수채화는 따뜻한 에스프레소색 배경에 흰 김이 오르는 두 잔을 전면에 배치했다. 한 사람은 "아이스 아메리카노, 얼음 세 개"를 정확하게 요청하고, 다른 사람은 "제일 예쁜 색 커피요"라고 말한다. 같은 메뉴판을 보며 전혀 다른 질문을 던지는 두 사람의 옆모습이 화면 안에서 살짝 겹쳐 있다. 브러시는 두 잔의 테두리를 같은 색으로 처리했다. 효율을 원하는 주문과 아름다움을 원하는 주문이 결국 같은 카운터 위에 놓인다. 다른 언어로 주문한 커피가 결국 같은 온도로 테이블에 놓인다는 것, 화가는 그 사실을 조용히 기록했다. 같은 잔 안에 서로 다른 세계가 담겼다.',
  4: '카페 창가 자리, 마주 놓인 두 잔의 커피와 엇갈린 시선. 연한 인디고와 따뜻한 세피아가 화면 좌우를 나눠 가진 수채화 안에서 두 인물의 시선은 서로를 지나 각자 다른 방향으로 뻗어 있다. "왜 그렇게 생각해요?"와 "어때요, 이 분위기?" 두 질문이 같은 테이블 위에서 처음 부딪힌 날이었다. 화가는 두 잔 사이의 빈 공간에 수채화 특유의 번짐을 넣어 대화의 공기를 묘사했다. 충돌이었지만 누구도 자리를 뜨지 않았다. 이유를 묻는 언어와 감각을 묻는 언어가 한 테이블 위에서 처음 만났다. 불편했지만 새로운 것이 있었다. 그 머뭄이 이야기의 진짜 시작이었고, 두 사람은 그것을 그때는 알지 못했다.',
  5: '박물관 유리 진열장 앞, 파란 조명이 도자기 표면을 감싸는 고요한 공간. 수채화는 청자색과 백자의 흰빛을 대비시키며 두 인물을 진열장 양쪽에 세웠다. 한 사람의 시선은 설명 패널의 작은 글자를 좇고, 다른 사람의 눈은 수천 년을 건너온 유약의 색조에 머문다. 같은 유물을 전혀 다른 방식으로 만나는 두 사람을 화가는 하나의 진열장 앞에 배치했다. 이름을 아는 것과 색을 느끼는 것은 모두 그 사물에 가닿는 방법이다. 어느 쪽이 더 깊이 보는가가 아니라, 두 시선이 만날 때 하나의 유물이 비로소 온전히 보인다. 그 교차점에서 처음으로 대화가 길어졌다.',
  6: '가로수길, 오후의 빛이 나뭇잎 사이로 내려앉는 산책로. 수채화는 초록과 금빛의 층을 겹쳐 공간 전체를 가볍게 흔들리는 질감으로 채웠다. 한 사람이 걷다가 멈춰 서서 처음으로 고개를 들어 하늘에게 묻는다. "어때요, 오늘 하늘?" 그것은 그가 한 번도 스스로에게 허락하지 않았던 종류의 질문이었다. 그녀의 대답은 짧고 선명했다. 화가는 그 대답을 받은 남자의 눈이 살짝 넓어지는 순간을 인물의 어깨 선과 고개 방향으로만 표현했다. 논리의 언어로 하늘을 묻는 것은 불가능하다. 그러나 그가 그것을 물었다는 사실이 이미 하나의 변화였다. 세계가 한 단계 넓어지는 데 단 하나의 질문이면 충분했다.',
  7: '단풍이 시작된 가로수 길, 두 사람이 나란히 걷고 있다. 수채화는 황금빛 잎들과 길 위의 자갈을 세밀하게 번지게 처리하고, 두 인물의 위치를 화면 중앙에서 살짝 어긋나게 배치했다. 한 사람의 손에는 지도가 들려 있고, 다른 사람의 시선은 길가에 홀로 비스듬히 자란 나무 위에 멈춰 있다. 지도에 없는 것들이 더 많은 길이 있다는 사실을 그는 아직 모른다. 화가는 그 나무를 유독 따뜻한 주황으로 칠했다. 기울어진 나무는 쓸모없는 것이 아니었다. 길을 벗어난 자리에서 더 오래 살아남은 것이 있다는 것을 그 나무가 말하고 있었다. 그것은 이 산책에서 가장 중요한 정보였다.',
  8: '"좋아요"라는 말이 오가는 스케치북 앞, 오후의 빛이 방 안에 가득하다. 수채화는 부드러운 번짐으로 빛을 묘사하고, 펼쳐진 스케치북을 화면 정중앙에 놓았다. 그가 건넨 "잘 그렸어요, 근데 이 선이 틀렸어요"는 논리적으로는 정확한 말이었다. 그러나 그 말이 지나간 자리에 작은 침묵이 내려앉았다. 화가는 그 침묵을 그림 속 빈 여백으로 표현했다. 맞는 말이 상처가 될 수 있다는 것, 언어에도 온도와 방향이 있다는 것을 그가 처음 배운 날이었다. 스케치북 위의 선 하나보다 그 선을 그린 사람이 더 중요하다는 것을 이 그림 앞에서 알았다. 정확성과 배려는 같은 문장 안에서 함께 살아야 한다.',
  9: '카페 창가, 오후의 옅은 빛이 테이블 위에 어른거리는 장면. 수채화는 따뜻한 살구색과 아이보리로 공간을 채우고, 두 인물의 얼굴에 동시에 번지는 미소를 담았다. 웃음이 터진 타이밍은 같았다. 그러나 그 이유는 달랐다. 한 사람은 방금 든 생각이 우스워서 웃었고, 다른 사람은 창밖 어딘가를 보다 웃었다. 화가는 두 인물의 시선이 교차하지 않아도 웃음이 같은 순간에 일어날 수 있다는 사실에 주목했다. 이유가 다르더라도 같은 리듬 안에 있다는 것이 하나의 연결이었다. 이해하지 않아도 함께 웃을 수 있다는 것, 그게 처음 알게 된 가능성이었고, 두 사람이 처음으로 가벼워진 순간이었다.',
  10: '갈림길 앞에 선 두 사람, 저녁 어스름이 깔리기 시작한 골목 어귀. 수채화는 군청과 회청 빛으로 어두워지는 하늘을 배경으로 두 인물이 서로 다른 방향을 가리키는 장면을 담았다. 하나는 지도의 길, 하나는 느낌이 이끄는 길이었다. 그날의 선택이 옳았는지보다 가지 않은 골목이 더 오래 마음에 남았다. 화가는 갈림길 중 선택받지 못한 쪽을 더 따뜻한 색으로 칠했다. 그것은 논리도, 감성도 아닌, 두 사람이 함께 경험한 처음 번의 상실이었다. 사라진 길을 함께 아쉬워하는 것도 하나의 함께하는 방식이었다. 첫 번째 싸움이 지나간 자리에 처음으로 공유된 아쉬움이 남았다.',
  11: '노트북 화면이 켜진 카페 테이블, 창밖으로 저녁이 내리기 시작하는 시간. 수채화는 형광빛 화면과 따뜻한 카페 조명을 대비시키며 두 인물 사이의 작은 거리감을 표현했다. 그가 열어 보인 엑셀 파일에는 데이트 일정이 세 개의 시트로 정리되어 있었다. 식당 평점, 이동 소요 시간, 날씨 백업 플랜. 그녀는 잠깐 멈췄다가 웃음을 참지 못했다. 화가는 그 웃음을 그녀의 어깨가 살짝 흔들리는 것으로만 표현했다. 세 개의 시트 안에 담긴 것은 데이터가 아니라 공들인 마음이었다. 가장 논리적인 방식으로 전달된 가장 감정적인 고백이었다. 그리고 그 고백은 웃음으로 받아들여졌다.',
  12: '기차역 광장과 그 앞에 선 시장 골목, 노점 불빛이 켜지는 저녁. 수채화는 선명한 형광빛 노점 조명과 저녁 연기의 번짐을 함께 담아 시장의 생동감을 표현했다. 계획표에는 없었던 어묵 포장마차 앞에 두 사람이 멈춰 섰다. 기차 시간표와 맞지 않는 선택이었다. 그러나 그 어묵 한 개의 온도가 그날 여행 전체보다 더 오래 기억에 남았다. 화가는 종이컵을 감싸 쥔 두 손을 화면 전면에 크게 배치했다. 계획이 빗나가는 순간에만 열리는 골목이 있다는 것을 두 사람은 그날 처음 알았다. 어묵 한 개가 가르쳐 준 것은 여행의 가장 중요한 문법이었다.',
  13: '공원 벤치 옆, 두 사람이 나란히 카메라를 들고 서 있다. 수채화는 역광의 연한 황금빛으로 장면 전체를 감싸고, 두 인물의 카메라 각도를 미묘하게 다르게 표현했다. 한 사람은 수평을 맞추고 구도를 정렬한다. 다른 사람은 이미 셔터를 눌렀다. 완성된 사진 속에는 약간 기울어진 지평선과 그 안에 살아있는 순간이 함께 담겼다. 화가는 그 기울기를 오히려 작품 안에서 완벽한 구도로 재현했다. 틀어진 수평이 때로 가장 정직한 순간을 담는다는 것을 이 그림이 말하고 있다. 정확성이 전부가 아니라는 것을, 그는 기울어진 사진 한 장으로 처음 받아들였다. 그날 이후 그는 카메라를 들기 전에 잠깐 망설이게 됐다.',
  14: '카페 창밖으로 보이는 도심 교차로, 신호등이 빨강으로 켜진 오후. 수채화는 창유리의 반사와 외부의 빨간 신호등을 겹쳐 이중의 공간감을 만들었다. 한 사람의 눈은 교차로의 차량 흐름과 신호 주기를 읽고 있다. 다른 사람의 눈은 그 빨강의 온도가 따뜻한지 차가운지를 느낀다. 화가는 같은 빨강을 화면 안에서 두 가지 온도로 칠했다. 두 시선은 모두 정확하다. 세상을 읽는 방식이 하나가 아니라는 것, 둘 다 옳을 수 있다는 것을 이 그림은 신호등 하나와 창 하나로 충분히 증명한다. 그날 카페에서 두 사람은 서로의 시선이 옳다는 것을 처음으로 동시에 인정했다.',
  15: '마트 과일 코너, 빨간 사과들이 진열대를 가득 채운 풍경. 수채화는 카드뮴 레드와 번트 시에나, 버밀리언을 섬세하게 혼합하며 "빨강"이 하나가 아님을 시각적으로 증명했다. 한 사람은 "빨간 사과"라고 말하고, 다른 사람은 "이건 노을색, 저건 석류색, 저건 장미 다홍"이라고 답한다. 같은 이름의 색이 얼마나 다를 수 있는지를 처음 알게 된 날이었다. 화가는 두 인물의 시선이 동일한 사과 위에서 만나되 전혀 다른 곳에 닿는 것을 섬세한 빛의 차이로 표현했다. 하나의 단어 안에 여러 개의 세계가 들어있다는 것을 그는 사과 진열대 앞에서 배웠다. 그날 이후 그는 빨강이라는 단어를 예전과 다르게 사용하게 됐다.',
  16: '카페 창가, 노트북 화면에 열린 엑셀 파일과 두 잔의 커피. 수채화는 형광 화면의 차가운 빛과 창밖 오후 햇살의 따뜻한 대비를 섬세하게 처리했다. 화면 속 표에는 항목들이 빼곡하게 채워져 있고, 마지막 행에는 "측정 불가"라는 텍스트와 작은 별표 하나가 붙어 있다. 그것이 고백이었다. 92점의 분석 끝에 남은 것은 숫자로 담을 수 없는 한 사람이었다. 화가는 그 별표 하나를 화면 안에서 가장 밝게 칠했다. 모든 논리가 무너지는 지점에서 시작되는 것이 있다. 측정 불가라는 항목을 만드는 사람이 될 수 있다는 것을 그는 그날 처음 알았다. 이 작품은 그 역설을 조용하고 정확하게 기록한다.',
  17: '생일 아침, 테이블 위에 나란히 놓인 두 개의 선물. 수채화는 은은한 크래프트 포장지색과 팔레트의 알록달록한 물감 색조를 한 화면에 담아 두 언어의 병치를 시각화했다. 보조 배터리의 실용성과 물감 팔레트의 아름다움, 서로를 향한 두 가지 배려가 처음으로 나란히 놓였다. 화가는 두 선물 사이의 여백에 부드러운 햇살 번짐을 더했다. 쓸모와 아름다움은 반대가 아니었다. 이해받는다는 것은 그 사람의 방식대로 선물 받는 것이었다. 상대가 원하는 것을 생각하는 방식이 이미 달랐지만, 두 선물은 같은 마음에서 나온 것이었다. 이 그림은 두 배려가 처음으로 나란히 놓인 순간을 담아낸다.',
  18: '작은 주방, 냄비 손잡이를 동시에 잡은 두 손. 수채화는 따뜻한 황토색 배경에 스팀이 오르는 냄비와 계량컵, 그리고 눈대중으로 재료를 넣는 손을 함께 담았다. 계량컵의 눈금과 손바닥의 감각이 같은 냄비 안에서 만났다. 오차가 있었다. 그러나 그릇을 깨끗이 비웠다. 화가는 두 손의 크기와 방향을 화면 중심에 크게 배치하며, 요리가 레시피보다 큰 무언가로 완성되는 순간을 담았다. 계획과 감각이 한 공간에서 협력할 때 나오는 것이 있다. 정확한 계량과 눈대중이 같은 냄비 안에서 섞였을 때 첫 번째 공동 작품이 완성됐다. 처음 함께 만든 식사는 맛보다 그 과정이 더 오래 기억에 남는다.',
  19: '조용한 식당, 창가 쪽 소개팅 테이블. 수채화는 실내의 따뜻한 황빛 조명과 창밖 거리의 차가운 저녁 빛을 대비시켰다. 앞에 앉은 사람과 대화가 오가는 동안 그의 시선은 자꾸 창 너머 어딘가로 향한다. 밥을 먹는 내내 다른 사람을 생각했다. 화가는 그의 시선 방향을 화면 바깥으로 열어 두었다. 무언가를 자꾸 생각하게 된다는 것, 그것이 데이터였다. 논리를 중시하는 사람이 논리로 설명할 수 없는 것을 처음 발견하는 순간을 이 그림은 기울어진 시선 하나로 기록한다. 계획에 없던 감정이 데이터가 되는 날이었다. 마음은 언제나 스프레드시트를 앞질렀다. 식사가 끝나고 집에 돌아가는 길에 그는 전화를 걸었다.',
  20: '카페 창가, 열린 노트와 커피 한 잔, 오후의 햇살. 수채화는 노트 위에 또렷하게 쓰인 첫 번째 줄을 화면 중앙에 배치하고, 그 위로 따스한 빛의 번짐을 얹었다. 10년 계획의 첫 항목에 이름 하나가 적혔다. 숫자와 목표로 채워지던 칸에 처음으로 사람이 들어온 것이다. 화가는 그 이름이 적힌 선 위에 가장 따뜻한 노란 빛을 칠했다. 계획표가 마침내 살아있는 것을 담게 된 날이었다. 효율을 위한 도구가 처음으로 마음을 기록하는 방식이 됐다. 10년 계획의 첫 줄에 이름이 들어올 때, 그것은 더 이상 계획이 아니라 결심이었다. 이 그림은 그 결심의 순간을 조용히 기록한다.',
  21: '작은 레스토랑 창가 테이블, 촛불 아래 반지와 마주 잡은 두 손. 수채화는 촛불의 따뜻한 빛을 배경으로 두 손의 온기를 화면 중심에 담았다. 182일의 준비와 계산 끝에 꺼낸 말이 있었고, 돌아온 대답은 단 한 글자였다. "응." 그 한 글자가 모든 스프레드시트보다 정확했다. 화가는 반지의 광채보다 두 손이 맞닿는 접촉면을 더 밝게 처리했다. 가장 정밀한 준비가 가장 단순한 답으로 완성되는 순간이 있다. 논리가 감성에게 자리를 내어주는 그 역설 안에 이 그림이 있다. 182일이 한 글자로 완성됐다. 그 한 글자는 그가 들어본 가장 정확한 대답이었다.',
  22: '웨딩드레스 매장, 흰색들이 가득한 고요한 공간. 수채화는 같은 흰색처럼 보이는 드레스들을 아이보리, 오프화이트, 샴페인, 밀크 화이트로 섬세하게 분리해 칠했다. 화면을 가득 채운 흰색의 스펙트럼 앞에서 한 사람이 처음으로 색에도 온도가 있다는 것을 알게 됐다. 화가는 그 발견의 순간을 인물의 멈춰선 자세와 살짝 기울어진 고개로 표현했다. 같은 이름의 색이 이토록 다를 수 있다는 것. 그것을 배운 것은 결혼식 준비가 아니라 세계를 보는 눈이 한 뼘 넓어지는 경험이었다. 샴페인 화이트와 밀크 화이트의 차이를 아는 사람 곁에 있다는 것이 무엇인지를 그는 그날 처음 이해했다.',
  23: '책상 위에 펼쳐진 스케치북, 물감이 아직 마르지 않은 수채화 청첩장. 작품은 작품 속 작품의 구조로 구성되어, 갓 완성된 청첩장 드로잉을 화면 중앙에 배치했다. 두 사람이 나란히 걷는 그림, 직접 그린 선과 번짐이 인쇄로는 담을 수 없는 온기를 가졌다. 화가는 수채화의 번짐 경계를 일부러 흐리게 처리했다. 설렘은 이렇게 인쇄된다. 계획된 형식이 아닌 손으로 직접 만든 것이 가장 정확하게 마음을 전달할 수 있다는 것을 이 그림은 두 겹의 붓질로 보여준다. 아직 마르지 않은 물감 위에 두 사람의 첫 번째 공동 작품이 있었다. 그것이 초대장이었고 약속이었다.',
  24: '새 신혼집 거실, 파란 소파가 놓인 창가. 수채화는 창으로 들어오는 오후 빛이 소파 위에 떨어지는 장면을 세루리안 블루와 황금빛으로 교차시켜 담았다. 효율을 원한 사람과 아름다움을 원한 사람이 가구 하나를 두고 오래 의견을 나눴다. 결과는 파란 소파였다. 쓸 수 있고 아름다운 것. 화가는 소파 위의 빛이 두 색을 동시에 품는 방식으로 결론을 표현했다. 함께 사는 것은 공간을 나누는 것이 아니라 서로의 기준을 한 공간에서 섞는 일이다. 두 사람이 처음으로 함께 만든 공간은 두 세계가 협상을 배운 자리이기도 했다. 파란 소파는 그 협상의 첫 번째 결과물이었다.',
  25: '프라하 구시가지 골목, 돌바닥 위에 나란히 드리운 두 개의 그림자. 수채화는 석회색 건물벽과 돌길의 질감을 촉촉하게 번지는 회청색으로 표현했다. 강수 확률 23%의 날, 우산을 챙겼지만 비는 오지 않았다. 대신 예측하지 못한 골목에서 빛이 가장 예뻤다. 지도에 없는 길 위에서 두 사람이 처음으로 같은 방향을 바라봤다. 화가는 두 그림자의 방향을 정확히 일치시켰다. 계획이 빗나가는 자리에서 여행이 진짜 시작된다는 것을 이 작품은 골목 하나와 두 개의 그림자로 충분히 담아냈다. 그날의 23%가 가장 좋은 날이 됐다. 두 그림자가 처음으로 같은 방향을 가리켰다. 어긋난 계획이 가장 완벽한 기억이 됐다.',
  26: '결혼식장 통로 끝, 버진 로드 위에 서 있는 두 사람. 수채화는 흰 꽃들과 아이보리 빛 공간을 배경으로 두 인물을 부드러운 역광 속에 실루엣처럼 담았다. 그날 아침 체크리스트는 완벽했다. 그러나 식이 시작되는 순간 목록이 전부 사라지고 그녀만 보였다. 화가는 체크리스트의 흔적을 화면 모서리에 극히 옅게만 남겨두었다. 준비는 이 순간을 위한 것이었다. 모든 계획이 완성되는 것은 계획을 잊는 순간임을 이 그림은 통로 하나와 두 실루엣으로 말한다. 그 통로의 끝에서 논리는 사랑에게 자리를 내어줬다. 그리고 그것은 가장 완전한 완성이었다. 통로 끝에서 그는 처음으로 숫자를 세지 않았다.',
  27: '식장의 제단 앞, 두 장의 서약서가 나란히 펼쳐진 장면. 수채화는 흰 종이 위의 두 필체를 각각 다른 색조의 잉크로 표현했다. 하나는 조건절과 근거로 구성된 논리의 문장들, 하나는 감각과 이미지로 가득한 시 같은 문장들이었다. 그러나 두 서약은 같은 테이블 위에 놓였고, 같은 날 낭독됐다. 화가는 두 장의 종이 사이에 아주 좁은 여백을 두었다. 두 언어가 하나가 된 것이 아니라, 두 언어인 채로 하나의 삶을 시작했다는 것을 그 여백이 말한다. 서로 다른 채로 같은 방향을 향한다는 것이 서약의 진짜 내용이었다. 그 좁은 여백 안에 두 사람의 40년이 시작됐다.',
  28: '신혼집 첫날밤, 낯선 천장과 새 어둠 속에 누운 두 사람. 수채화는 어두운 인디고와 딥 바이올렛으로 밤 공간을 채우고, 두 인물의 손이 이불 위에서 맞닿는 부분에만 따뜻한 빛을 남겼다. 집이 낯설었다. 가구도, 커튼도, 천장의 모양도. 그러나 숨소리는 낯설지 않았다. 화가는 어둠의 양을 절제하지 않고 충분히 채웠다. 낯섦 속에서도 낯설지 않은 것이 있다는 것, 그게 함께 사는 첫날의 발견이었다. 맞닿은 손 하나가 모든 낯선 것들보다 더 큰 자리를 차지했다. 침묵 안에 안도가 있는 밤이었다. 낯선 집이 집이 되는 것은 천천히 시작됐다. 그 첫날 밤 두 손이 집의 첫 기둥이 됐다.',
  29: '긴 직사각형 식탁, 양쪽에 앉은 두 가족. 수채화는 따뜻한 식사 조명 아래 두 그룹의 사람들을 배치하고, 그 중간에 선 두 인물을 화면의 축으로 삼았다. 감성의 언어를 쓰는 집안과 논리의 언어를 쓰는 집안 사이에서 두 사람이 통역사가 됐다. 화가는 두 인물의 몸이 양쪽을 향해 각각 열려 있는 자세를 섬세하게 표현했다. 두 세계를 모두 이해한다는 것은 특별한 능력이다. 그리고 그것은 서로에게 배운 언어였다. 식탁 하나가 두 언어를 동시에 수용하는 공간이 됐을 때, 두 사람은 비로소 가장 중요한 역할을 했다. 서로에게 배운 것이 다른 사람을 잇는 다리가 됐다.',
  30: '결혼 1주년 기념 레스토랑, 처음 왔던 자리와 같은 테이블. 수채화는 따뜻한 조명과 유리잔의 반짝임으로 공간을 채우고, 두 인물이 같은 자리에서 다른 표정으로 앉아 있는 장면을 담았다. 한 사람은 정확한 날짜와 시간을 기억하고, 다른 사람은 그날의 빛과 설렘을 기억한다. 두 기억이 같은 테이블 위에서 마주쳤다. 화가는 테이블 위의 꽃 한 송이를 정중앙에 두었다. 기억하는 방식이 달라도 기억하고 있다는 것 자체가 사랑이라는 것을 이 1주년 저녁 식사가 조용히 확인해 주었다. 같은 자리에서 다른 기억을 꺼냈을 때 비로소 그날이 완성됐다. 두 기억이 합쳐지자 일 년이 비로소 완전해졌다.',
  31: '이른 아침 부엌, 두 개의 커피잔이 놓인 조리대. 수채화는 7시의 청명한 아침빛과 7시 33분의 약간 기울어진 햇살을 한 화면에 담았다. 한 사람의 커피는 늘 7시에 준비되어 있다. 다른 사람이 내려오는 시간은 늘 7시 33분이다. 식은 커피와 미리 맞춰둔 온도, 그것이 계획표에 없는 항목으로 매일 반복됐다. 화가는 두 잔의 온도 차를 빛의 농도로 표현했다. 말 없는 배려가 루틴이 될 때, 그것이 사랑의 문법이 된다. 7시 33분을 위해 7시에 커피를 내리는 것, 그것은 계획서에 없는 가장 일관된 고백이었다. 이 그림은 그 고백을 두 잔으로 담는다.',
  32: '마트 카트 안, 장바구니 물건들 사이의 보라 양배추 한 통. 수채화는 초록과 회색빛 장바구니 속에서 보라 양배추의 짙은 퍼플 색조가 돌출되는 장면을 화면 중심에 배치했다. 목록에 없었다. 그러나 그 보라색이 예뻐서 담았다. 그주 내내 식탁이 화사해졌다. 화가는 양배추 주변의 다른 장바구니 물건들을 의도적으로 단색으로 처리했다. 계획에 없는 아름다움이 삶을 환하게 만드는 방식이 있다. 목록 밖의 것들이 때로 가장 좋은 결정이 된다. 보라 양배추 하나가 그주의 식탁을 바꾸었다. 이 그림은 계획 밖에서 들어오는 색깔의 힘을 담는다. 그는 그날 이후 가끔 목록에 없는 것을 사기 시작했다.',
  33: '벼룩시장 한 켠, 긁힌 자국이 있는 나무 빈티지 의자. 수채화는 오래된 나무 표면의 결과 긁힘을 따뜻한 세피아와 로 엄버로 세밀하게 표현하고, 두 인물이 함께 바라보는 장면을 담았다. 흠집이 있었지만 결이 아름다웠다. 다리 하나를 보강하고 집으로 들였다. 처음으로 둘이 함께 고른 물건이었다. 화가는 보강된 다리와 살아남은 세월의 흔적을 동등한 무게로 표현했다. 안전하고 아름다운 것이 공존할 수 있다는 것을 처음으로 함께 발견했다. 그 의자 위에서 두 세계의 협상이 처음으로 완성됐고, 그것이 가장 좋은 결과물이었다. 의자 하나가 두 사람의 방식을 하나의 형태로 담았다.',
  34: '나란히 놓인 두 개의 가계부, 노트북과 손 글씨 노트. 수채화는 차가운 화면 빛의 엑셀 표와 따뜻한 노트 종이 질감을 한 화면에 대비시켰다. 엑셀 가계부에는 항목과 금액이 정확하게 기입되어 있다. 노트 가계부에는 "커피 × 6 = 봄"이라고 쓰여 있다. 화가는 두 기록물의 물리적 크기를 동일하게 처리했다. 숫자는 사실을 기록하고, 감성은 의미를 기록한다. 두 가계부가 함께 있어야 한 달이 완성된다. 봄을 커피 여섯 잔으로 표현하는 사람과 사는 것이 어떤 것인지를 엑셀 표가 증언할 수 없었다. 이 그림은 나란한 배치로 두 기록이 모두 필요하다는 것을 말한다.',
  35: '저녁 식탁, 무거운 침묵이 내려앉은 두 사람과 식은 음식. 수채화는 식은 음식과 어두워진 창밖을 배경으로 두 인물의 마주 앉은 자세를 거리감 있게 표현했다. 논리적 언어로는 해결되지 않는 종류의 상처가 있었다. 그때 그가 처음으로 물었다. "서운했어?" 그 한마디가 모든 논리의 언어보다 먼저 도착했다. 화가는 그 질문이 오가는 순간을 두 인물 사이의 공기가 살짝 풀리는 것으로 표현했다. 감성의 언어를 배우는 것은 설명서가 없는 과정이다. 그 한 문장이 그날 밤을 바꾸었다. 15년이 지나도 배울 수 있는 것이 있다는 것을 그날 알았다. 식은 밥을 다시 데웠다.',
  36: '긴 식탁, 여섯 명의 사람들이 앉아 있는 늦은 저녁. 수채화는 식탁 위의 음식들과 유리잔의 반사, 다양한 표정을 따뜻한 황토색 조명 아래 채웠다. 공학도 친구들과 예술대 친구들이 한 테이블에 앉았다. 처음엔 어색했다. 그러나 대화가 깊어지며 공학의 기하학과 예술의 기하학이 같은 것을 다른 언어로 말하고 있다는 것을 발견했다. 화가는 테이블 위에 두 그룹의 잔들이 뒤섞이는 장면을 담았다. 세계는 생각보다 가깝게 연결되어 있다는 것을 그 밤의 식탁이 증명했다. 두 사람은 서로의 세계가 얼마나 가까운지를 그날 처음 목격했다. 저녁이 끝날 무렵 잔들의 자리가 완전히 뒤섞여 있었다.',
  37: '병원 신생아실, 아버지의 손가락을 감싸 쥔 아주 작은 손. 수채화는 작은 손가락의 세밀한 묘사에 집중하고, 배경을 극도로 단순화했다. 3.2킬로그램, 49센티미터. 숫자로 표현된 작음이 주는 감각을 숫자는 설명할 수 없었다. 그 작은 손이 손가락 하나를 감쌌을 때 무너진 것은 논리가 아니라 세계의 중심이었다. 화가는 그 접촉면에 가장 따뜻하고 밝은 색을 얹었다. 설명 불가능한 것들을 처음으로 온몸으로 받아들인 날이었다. 작다는 것의 크기를 그날 처음으로 알았다. 그것은 어떤 측정값으로도 담을 수 없는 무게였다. 그는 그날 밤 긴 시간 그 손을 바라보았다. 그리고 그녀에게 처음으로 눈물을 보였다.',
  38: '아이방 바닥, 파란 크레용을 쥔 작은 손과 스케치북. 수채화는 크레용 흔적과 스케치북이 가득한 바닥을 위에서 내려다보는 시점으로 구성했다. 한 사람은 발달 기준표를 확인하고, 다른 사람은 그 색이 얼마나 과감한지에 주목한다. 두 방식이 함께 있어야 아이를 온전히 볼 수 있었다. 화가는 크레용 선의 대담한 방향을 중심으로 화면을 구성했다. 아이를 키운다는 것은 두 세계를 동시에 필요로 하는 일이었다. 논리와 감성이 협력하는 방식을 아이가 두 사람에게 가르쳐 주었다. 파란 크레용 선 하나가 두 사람을 다시 하나로 이었다. 작은 방 바닥이 두 사람의 교실이 됐다.',
  39: '공원 산책로, 담벼락 이끼 앞에 멈춰 선 세 사람. 수채화는 이끼의 다채로운 초록빛을 화면 좌측에 가득 채우고, 개미 한 마리를 이끼 위에 작게 표현했다. 오늘의 동선은 계획대로였다. 그러나 아이가 개미를 발견하며 모든 계획이 무너졌다. 더 좋은 장면이 남았다. 화가는 개미를 지나치게 크게 그리지 않았지만, 세 시선이 모두 그 위에 모이는 구도를 만들었다. 계획은 길을 만들고, 우연은 풍경을 만든다. 이끼 한 조각 앞에서 세 사람이 함께 멈춘 순간이 그날의 진짜 목적지였다. 아이가 두 사람에게 다시 세계를 보는 법을 가르쳤다. 세 시선이 개미 위에서 하나가 됐다.',
  40: '오후의 거실, 빨래를 개는 손과 설거지를 하며 노래하는 모습. 수채화는 햇볕이 들어오는 창 너머의 빛과 집안일이 이루어지는 실내의 온기를 함께 담았다. 협상은 효율을 기준으로 시작했다. 그러나 끝에 남은 것은 정성이었다. 화가는 노래하는 입 모양과 빨래를 정확하게 접는 손을 같은 화면 안에 담았다. 일상의 협상이 사랑의 협약이 되는 지점이 있다. 집안일이 분업을 넘어 함께하는 리듬이 되는 순간을 이 그림은 오후 햇살과 콧노래로 표현한다. 효율보다 정성이 이긴 협상의 결과가 가장 풍요로운 오후였다. 두 사람은 그날 가장 일상적인 방식으로 함께 있었다. 콧노래가 그 오후의 배경음악이 됐다.',
  41: '넓어진 식탁, 두 개의 그릇이 놓인 조용한 저녁. 수채화는 예전에 더 많은 그릇이 놓였을 자리의 흔적을 빛의 밝기 차이로 미묘하게 표현했다. 아이가 떠난 뒤 식탁이 넓어졌다. 처음엔 고요함이 낯설었다. 화가는 두 그릇 사이의 공간을 채우지 않고 남겨두었다. 그러나 반찬을 건네는 손이 있었다. 처음으로 돌아간 것인지, 새로 시작하는 것인지. 그 경계에서 저녁을 함께 먹었다는 것이 이 그림이 담은 전부다. 넓어진 자리가 공백이 아니라 다시 둘만의 공간이 되어가는 저녁이었다. 두 그릇은 충분했다. 오래된 두 사람이 다시 처음처럼 마주 앉았다. 그리고 둘 다 그것이 좋았다.',
  42: '서재 책상, 스프레드시트 화면 옆에 놓인 새 스케치북. 수채화는 화면의 차가운 빛과 스케치북의 따뜻한 종이 질감을 화면 좌우에 배치해 대비를 이뤘다. 은퇴 계획을 정리하던 스프레드시트에서 처음으로 수입 칸을 비워두었다. 그리고 그림 시간을 계획표의 첫 항목에 넣었다. 화가는 스케치북의 첫 페이지가 아직 비어 있는 상태를 담았다. 비어있는 것은 미완성이 아니라 가능성이다. 효율보다 중요한 무언가를 위한 자리를 만드는 것, 그것도 하나의 설계였다. 비워둔 칸과 새 스케치북이 같은 책상 위에 놓였을 때, 새 챕터가 시작됐다. 그는 40년 만에 다른 종류의 계획표를 만들었다. 그리고 그녀에게 먼저 보여줬다.',
  43: '리스본 구불구불한 골목, 지도를 접는 남자의 뒷모습. 수채화는 포르투갈의 전통 아줄레주 타일 벽면을 화면 배경으로 가득 채우고, 그 앞에 선 두 실루엣을 역광으로 처리했다. 지도를 접었다. 처음이었다. 그 골목에서 두 사람이 처음으로 같은 속도로 걷기 시작했다. 화가는 지도가 반쯤 접힌 장면을 화면 전면이 아닌 뒷모습의 손에 작게 묘사했다. 계획 없는 여행에서 처음으로 걸음이 맞았다는 것. 그것은 40년에 가까운 시간이 만들어낸 변화였다. 이 그림은 그 발견을 끝이 보이지 않는 골목 구도로 담았다. 지도를 접은 손이 그녀의 손을 잡았다. 골목은 두 사람을 천천히 받아들였다.',
  44: '병원 상담실, 건강검진 결과지가 놓인 테이블과 두 사람. 수채화는 서류의 흑백 질감과 창밖의 부드러운 바깥빛을 대비시켰다. 숫자는 정확했다. 그러나 의사의 표정에는 숫자에 없는 정보가 있었다. 두 사람이 함께 읽어야 전체 그림이 나왔다. 화가는 결과지와 창밖 빛을 동시에 보는 두 인물의 시선을 화면 안에서 교차시켰다. 이것이 두 사람이 만든 통역의 방식이다. 데이터와 감성이 함께 있어야 한 사람의 상태를 제대로 읽을 수 있다는 것을 이 그림은 담담하게 기록한다. 오랜 시간 함께 쌓은 두 언어가 가장 필요한 순간에 함께 있었다. 두 시선이 하나의 결과지를 완성했다.',
  45: '오후의 서재, 같은 테이블에서 각자의 작업을 하는 두 사람. 수채화는 수채화 팔레트와 설계 스케치 도구가 같은 테이블 위에 놓인 장면을 따뜻한 오후 빛으로 담았다. 말이 없었다. 각자 다른 것을 하고 있었다. 그러나 둘 다 그 조용함이 좋았다. 화가는 두 인물의 시선이 화면 바깥을 향하게 했다. 서로를 바라보지 않아도 같은 공간에 있다는 것만으로 충분한 시간이 있다. 이 그림은 함께 있다는 것의 또 다른 형태를, 아무 말 없이도 완성되는 오후 한 장면으로 포착했다. 이것이 40년이 가르쳐 준 가장 깊은 형태의 함께함이었다. 같은 테이블이 두 세계를 오랫동안 품었다.',
  46: '은퇴 후 오후의 산책로, 이끼 낀 담벼락 곁을 걷는 두 사람. 수채화는 담벼락의 초록 이끼와 바닥에 웅크린 작은 고양이를 서정적인 번짐으로 표현했다. 서두르지 않는 걸음. 지도를 보지 않아도 되는 시간. 화가는 두 인물의 그림자가 같은 방향으로 길게 뻗어 있는 장면을 담았다. 지도를 벗어난 골목에서만 보이는 것들이 있다는 것을 이제 두 사람 모두 안다. 느린 산책은 목적지를 잃은 것이 아니라 처음으로 온전히 걷는 것이었다. 그림자의 길이가 함께한 시간을 말해주고 있었다. 가장 느린 걸음이 가장 많은 것을 보게 했다. 고양이 앞에서 두 사람이 동시에 멈췄다.',
  47: '오래된 동창회 자리, 테이블 위에 펼쳐진 낡은 스케치북과 상상 속의 설계도. 수채화는 세월에 바랜 종이 질감과 당시 그린 선들의 흐릿함을 수채화 특유의 번짐으로 표현했다. 그 자리엔 꿈꾸던 집 설계도가 있었고, 그려두었던 풍경이 있었다. 청춘은 숫자 속에 있지 않았다. 그려두었던 것들과 설계해 두었던 것들 속에 있었다. 화가는 스케치북의 오래된 선 위에 현재의 빛을 살짝 얹었다. 오래전에 꿈꾼 것들이 지금도 존재한다는 사실이 때로 가장 확실한 위안이 된다. 청춘이 지나간 자리에 청춘이 남긴 것들이 있었다. 두 사람은 오래된 선들 위에서 자신들을 다시 만났다.',
  48: '저녁, 병원 스케줄표 옆에 놓인 전화기. 수채화는 스케줄표의 빼곡한 텍스트와 전화기의 작은 화면을 대비시키며 두 가지 돌봄의 방식을 한 화면에 담았다. 특별한 이유 없이 전화를 걸었다. 그냥 생각나서. 그것이 모든 스케줄보다 컸다. 화가는 전화기 화면에서 번지는 빛을 따뜻하게 처리하고, 그 빛이 주변을 밝히도록 구성했다. 돌봄은 계획표 안에 있지 않다. 그냥 생각나서 거는 전화 한 통이 가장 정확하게 도착하는 언어였다. 그것이 수십 년에 걸쳐 배운 가장 중요한 문법이었다. 감성의 언어가 가장 필요한 자리에 있었다. 전화기 화면에서 번진 빛이 방 전체를 따뜻하게 만들었다.',
  49: '25주년 기념일, 창가의 두 잔 차와 편지지. 수채화는 창을 통해 들어오는 오후 빛과 김이 오르는 차의 온기를 함께 담아 따뜻한 분위기를 완성했다. 이해하지 않아도 사랑할 수 있다는 것을 이제 알고 있다. 처음 고백보다 더 정확한 고백이 25년 후에 왔다. 화가는 편지지 위에 쓰인 글자를 흐릿하게 처리했다. 읽히는 것보다 쓰여 있다는 사실 자체가 중요하다. 25년이 만들어낸 사랑의 정확성은 처음의 어떤 말보다 무거웠다. 이 그림은 그 무게를 오후 빛 한 줄기와 두 잔의 차로 담는다. 25년이 가르쳐 준 것이 편지지 위에 있었다.',
  50: '카페 테이블, 펼쳐진 스케치북 위의 수채화 한 장. 수채화는 미술관 앞에 선 노년의 두 사람을 담은 그림을 화면 중앙에 배치하고, 그 주변을 따뜻한 오후 빛으로 감쌌다. 아직 오지 않은 40주년을 그녀가 먼저 그렸다. 두 노인이 미술관 계단 앞에 나란히 서 있는 그림이었다. 화가는 스케치북 안의 그림과 현실의 경계를 일부러 흐릿하게 처리했다. 미래를 그린다는 것은 예언이 아니라 소원이다. 그리고 소원은 때로 가장 정확한 계획이 된다. 그림 속 두 사람은 이미 행복해 보였다. 아직 오지 않은 날을 그릴 수 있다는 것이 가장 큰 설계였다.',
  51: '넓은 하늘 아래 산책로, 세루리안 블루로 가득한 오후. 수채화는 화면의 절반 이상을 맑고 투명한 파란 하늘로 채우고, 그 아래 나란히 걷는 두 인물의 뒷모습을 담았다. 40년 만에 하늘이 보이기 시작했다. 숫자와 계획표를 보던 눈이 처음으로 온전히 하늘을 올려다보았다. 화가는 두 인물을 화면 아래쪽에 작게 배치해 하늘의 압도적인 아름다움을 강조했다. 세계가 이토록 넓었다는 것을 알아가는 데 40년이 걸렸지만, 알게 된 것은 그 어떤 계획보다 좋은 것이었다. 세루리안 블루는 그 발견의 이름이었다. 하늘이 드디어 보였다. 그 색을 그녀에게 처음으로 물었다. 그녀가 웃으며 대답했다.',
  52: '공원 벤치, 손자의 손을 잡은 두 노인의 손. 수채화는 세 겹의 손, 세 세대의 크기 차이를 중심에 배치하고 배경을 봄빛 초록으로 채웠다. 논리와 감성, 두 세계가 작은 손 안에 함께 흘러 들어간다. 화가는 세 손의 피부 질감을 각각 다르게 표현했다. 세월의 결이 다른 세 손이 한 그림 안에 모였다. 세상이 이어지는 방식은 이렇게 작고 구체적이다. 이 그림은 세대를 넘는 연결이 얼마나 단순하고 따뜻한 형태로 이루어지는지를, 손 하나의 무게와 크기로 담아냈다. 두 세계가 한 손 안에서 다음 세대로 건너갔다. 공원 벤치 위에서 40년이 한 번 더 시작됐다.',
  53: '서재 테이블, 나란히 놓인 연도별 기록 파일과 수채화 스케치. 수채화는 정리된 문서 바인더의 기하학적 질감과 스케치북의 유기적 번짐을 화면 좌우에 배치했다. 한 인생을 두 사람이 다른 방식으로 기록했다. 연도와 사건, 그리고 색과 감각. 두 기록을 함께 펼치면 한 사람은 기억할 수 없는 것이 담겨 있었다. 화가는 두 기록물이 화면 중앙에서 살짝 겹치는 구도를 만들었다. 한 인생을 온전히 담으려면 두 가지 언어가 모두 필요하다. 나란한 기록이 가장 완전한 회고록이었다. 두 사람이 함께 써야 하나의 인생이 완성됐다. 겹치는 지점에서 가장 중요한 것들이 있었다.',
  54: '부엌 선반 위, 오래된 계량컵과 낡은 물건들. 수채화는 오래된 사물들의 질감과 세월의 흔적을 따뜻한 황갈색 계열로 표현했다. 집을 정리하다 발견했다. 첫 카레를 만들었던 계량컵이었다. 버릴 수 없었다. 화가는 계량컵 표면의 흠집과 변색을 지우지 않고 그대로 담았다. 물건은 기억을 달고 산다. 그것을 아는 사람과 사는 삶에서 물건은 단순한 도구가 아니라 함께 살아온 증거가 된다. 이 그림은 버리지 못하는 것들의 이유를 따뜻하게 옹호하며, 선반 위의 물건들을 시간의 기록으로 바라본다. 흠집이 기억이 됐다. 계량컵을 들고 그는 그날의 냄새를 맡았다. 그녀도 함께 그것을 기억했다.',
  55: '병원 복도, 긴 의자에 나란히 앉은 두 사람. 수채화는 병원 복도의 차갑고 긴 공간을 회백색으로 처리하고, 두 인물이 앉아 있는 부분만 미세하게 따뜻한 빛을 얹었다. 말이 없었다. 기다리는 시간이었다. 그러나 혼자가 아니었다. 화가는 두 인물의 손이 무릎 위에 각각 놓여 있지만 아주 가깝게 배치된 것을 섬세하게 표현했다. 말보다 큰 언어가 있다. 같은 자리에 앉아 기다리는 것, 그것이 때로 가장 완전한 위로였다. 복도의 차가운 흰 빛 속에서 그 따뜻함이 더 선명했다. 함께 기다린다는 것이 모든 말을 대신했다. 긴 복도가 그날 두 사람 사이에서 짧아졌다.',
  56: '소파 위, 나란히 앉아 사진첩을 펼친 두 사람. 수채화는 사진첩의 오래된 사진들이 번지듯 배치된 장면을 따뜻한 세피아 빛으로 표현했다. 같은 사진을 다르게 기억한다. 한 사람은 날짜와 장소를 기억하고, 다른 사람은 그날의 빛과 온도를 기억한다. 두 기억이 합쳐져야 그날이 완성됐다. 화가는 두 인물의 시선이 같은 사진 위에서 미세하게 다른 지점에 닿는 것을 포착했다. 두 눈으로 봐야 완성되는 사진이 있다. 함께 산다는 것이 기억을 서로 보완하는 방식임을 이 그림은 사진첩 한 권으로 담아낸다. 두 기억이 합쳐졌을 때 하나의 삶이 완성됐다. 사진첩은 두 사람이 함께 쓴 이야기였다.',
  57: '아이슬란드의 밤하늘, 오로라가 펼쳐진 넓은 하늘 아래 두 실루엣. 수채화는 에메랄드 그린과 바이올렛, 코발트 블루를 층위로 겹쳐 오로라의 투명한 빛을 최대한 표현했다. 스프레드시트에는 "계획 없는 날 2일"이 적혀 있었다. 그리고 그날 밤 처음으로 두 사람이 같은 것을 보며 아무 말도 하지 않았다. 화가는 두 실루엣을 화면 아래 작게 배치하며 하늘의 압도적인 빛 앞에서 두 언어가 모두 필요 없어지는 순간을 담았다. 말이 사라지는 자리에서 두 사람이 처음으로 완전히 같았다. 오로라 앞에서는 논리도 감성도 없고 그저 같은 하늘이 있었다. 그것으로 충분했다. 두 실루엣이 그 하늘 아래서 조용히 손을 맞잡았다.',
  58: '조용한 오후, 손으로 쓴 편지지와 봉투. 수채화는 종이 위의 손글씨 질감과 따뜻한 창가 빛을 담아 편지를 쓰는 행위의 온도를 표현했다. 40년 만에 처음으로 편지를 썼다. 타이핑이 아닌 손글씨로. 내용은 길지 않았다. "딱 지금이야." 그 한마디면 충분했다. 화가는 편지지 위의 선이 약간 떨리는 것을 섬세하게 표현했다. 손글씨는 말과 다르다. 쓰는 동안 손이 기억하는 것들이 함께 종이에 담긴다. 40년의 무게가 그 떨림 안에 있었다. 이 그림은 손이 전달하는 온도와 떨림을 기록한다. 편지 한 장이 40년을 담았다. 그녀는 그 편지를 지금도 가지고 있다.',
  59: '미술관 정문 계단, 오후 3시의 가을 빛. 수채화는 40년 전 첫 번째 그림과 같은 배경, 같은 기둥, 같은 햇살 각도를 담았다. 그러나 두 인물은 달랐다. 이번엔 시계를 보지 않았다. 그냥 그녀를 보고 있었다. 화가는 두 그림의 구도가 미묘하게 다른 것을 의도했다. 40년 전 두 사람 사이의 공백은 좁아졌지만 사라지지 않았다. 각자의 세계를 유지하면서도 같은 계단 위에 서게 된 것이 사랑의 완성이었다. 같은 자리에서 다른 사람이 되어 다시 만났다. 오후 3시의 빛은 그때나 지금이나 같았지만, 그 안에 선 사람이 달랐다. 두 사람은 이제 그 빛 안에서 같은 것을 느꼈다.',
  60: '이른 아침 창가, 시계와 하늘이 함께 보이는 자리. 수채화는 창 너머 하늘의 파란빛과 실내의 따뜻한 아침 빛이 경계 없이 섞이는 장면을 화면 가득 표현했다. 각자 다른 것을 보며 살았다. 그러나 어느 순간부터 그가 하늘을 보기 시작했고, 그녀가 시계를 읽을 줄 알게 됐다. 화가는 두 시선의 방향이 한 창문 안에서 겹치는 구도를 담았다. 다른 방식으로, 같은 하루를 사는 것. 서로의 세계를 사랑한 채로 함께 늙어가는 것. 이해가 아니라 공존이었다. 그것이 40년이 만들어낸 가장 아름다운 결론이었다. 처음과 같은 창가에서, 처음과 다른 눈으로.'
};

// ── 갤러리 데이터 생성 ──
const GALLERY_COVER = [{
  id: 0,
  tag: 'cover',
  ep: null,
  part: 0,
  title: '함께 걷는 길',
  sub: '표지 그림 · 2026',
  src: '1. 자료/ChatGPT Image 2026년 3월 15일 오후 01_01_17.png',
  svgMode: false,
  epLink: null,
  epLabel: null,
  desc: '가을 공원 산책로를 나란히 걷는 두 사람. 낙엽이 내려앉은 돌길 위로 오후의 황금빛이 고르게 쏟아지고, 화면은 따뜻한 황토와 은행나무 노랑으로 가득하다. 남자는 어깨에 설계 도면을 끼웠고, 여자는 물감이 튄 원피스 위에 들꽃 한 다발을 안았다. 손은 꼭 맞잡혀 있다. 각자 다른 것을 들고, 다른 방향을 바라보며 살아왔지만, 걷는 속도는 오래전부터 같아졌다. 숫자로 세상을 보는 사람과 색으로 세상을 보는 사람이 40년을 함께 걸어온 자리—이 한 장의 그림이 그 모든 이야기의 표지다.'
}];

function buildEpisodeGallery() {
  return getPublishedEpisodes().map(ep => {
    const epNum = ep.episode_number;
    const illus = ILLUSTRATIONS[epNum] || ILLUSTRATIONS.default;
    return {
      id: epNum,
      tag: 'ep',
      ep: epNum,
      part: ep.part_number,
      title: ep.title,
      sub: `EP.${epNum} · ${getPartName(ep.part_number)}`,
      src: null,
      svgMode: true,
      epLink: `episode-detail.html?id=${ep.id}`,
      epLabel: `EP.${epNum} 읽기`,
      desc: EP_DESCS[epNum] || illus.caption || ep.summary,
      illusCaption: illus.caption || '',
    };
  });
}

const GALLERY = [...GALLERY_COVER, ...buildEpisodeGallery()];

let currentFilter = 'all';

function filterTag(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function getFiltered() {
  if (currentFilter === 'all') return GALLERY;
  if (currentFilter === 'cover') return GALLERY.filter(g => g.tag === 'cover');
  const part = parseInt(currentFilter);
  return GALLERY.filter(g => g.part === part);
}

function galleryCard(g) {
  const imgHtml = g.svgMode
    ? `<img src="${getIllustrationDataURI(g.ep)}" alt="${g.title}" loading="lazy">`
    : `<img src="${g.src}" alt="${g.title}" loading="lazy">`;
  const badge = g.tag === 'cover' ? '표지·메인' : `EP.${g.ep}`;
  return `
  <div class="gallery-card" onclick="openLightbox(${g.id})">
    <div class="gallery-img-wrap">
      ${imgHtml}
      <span class="gallery-img-badge">${badge}</span>
      ${g.epLink ? `<a class="gallery-ep-link" href="${g.epLink}" onclick="event.stopPropagation()">${g.epLabel}</a>` : ''}
    </div>
    <div class="gallery-card-body">
      <div class="gallery-card-title">${g.title}</div>
      <div class="gallery-card-sub">${g.sub}</div>
      <p class="gallery-card-desc">${g.desc}</p>
    </div>
  </div>`;
}

function renderGallery() {
  const grid  = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyState');
  const list  = getFiltered();
  document.getElementById('totalCount').textContent = GALLERY.length - 1; // 표지 제외 공개된 수
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    // 다음 공개 예정 날짜 동적 표시
    const allEps = SAMPLE_EPISODES || [];
    const today0 = new Date(); today0.setHours(0,0,0,0);
    const nextEp = allEps.sort((a,b)=>new Date(a.date)-new Date(b.date))
      .find(e => { const d=new Date(e.date); d.setHours(0,0,0,0); return d>today0; });
    const dateMsg = nextEp
      ? (()=>{ const [y,m,d]=nextEp.date.split('-'); return `${y}년 ${m}월 ${d}일부터 하루에 한 개의 그림 이야기가 공개됩니다.`; })()
      : '곧 연재될 예정입니다.';
    document.getElementById('emptyStateMsg').textContent = '이 부의 그림 이야기가 곧 연재됩니다. ' + dateMsg;
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = list.map(galleryCard).join('');
  }
}

// ── 라이트박스 ──
function openLightbox(id) {
  const g = GALLERY.find(x => x.id === id);
  if (!g) return;
  const lbImg = document.getElementById('lightboxImg');
  const lbSvg = document.getElementById('lightboxSvg');
  const lbLink = document.getElementById('lightboxEpLink');
  if (g.svgMode) {
    const illus = ILLUSTRATIONS[g.ep] || ILLUSTRATIONS.default;
    lbImg.classList.add('hidden');
    lbSvg.classList.remove('hidden');
    lbSvg.innerHTML = illus.svg;
  } else {
    lbSvg.classList.add('hidden');
    lbImg.classList.remove('hidden');
    lbImg.src = g.src;
    lbImg.alt = g.title;
  }
  document.getElementById('lightboxTitle').textContent = g.illusCaption || g.title;
  document.getElementById('lightboxDesc').textContent  = g.desc;
  if (g.epLink) {
    lbLink.href = g.epLink;
    lbLink.textContent = `${g.epLabel} →`;
    lbLink.classList.remove('hidden');
  } else {
    lbLink.classList.add('hidden');
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

renderGallery();
</script>
