<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림 이야기 — 공대생 할아버지, 미대생 할머니</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* 페이지 히어로 */
.page-hero{
  background:linear-gradient(135deg,#0E2440 0%,var(--navy) 55%,#5C2A0A 100%);
  padding:52px 0;color:#fff;text-align:center;
  border-bottom:3px solid var(--terra);
}
.page-hero h1{color:#fff;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.page-hero p{color:rgba(255,255,255,.82);font-size:.96rem;max-width:540px;margin:0 auto}

/* 필터 탭 */
.filter-bar{
  background:var(--white);
  border-bottom:2px solid var(--border);
  position:sticky;top:66px;z-index:90;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.filter-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.filter-inner::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:14px 20px;font-size:.86rem;font-weight:600;
  color:var(--text-light);background:none;
  border-bottom:3px solid transparent;
  transition:all .2s;white-space:nowrap;min-height:48px;
}
.filter-btn:hover{color:var(--terra);background:rgba(184,85,48,.05)}
.filter-btn.active{color:var(--terra-dark);border-bottom-color:var(--terra);background:rgba(184,85,48,.06);font-weight:700}
.filter-divider{width:1px;background:var(--border);flex-shrink:0;margin:10px 4px}

/* 갤러리 그리드 */
.gallery-section{background:var(--cream-dark);min-height:60vh;padding:40px 0 64px}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:32px;
}
@media(max-width:760px){.gallery-grid{grid-template-columns:1fr;gap:24px}}

/* 갤러리 카드 */
.gallery-card{
  background:var(--bg-card);
  border-radius:var(--radius);
  border:2px solid var(--border-card);
  overflow:hidden;
  box-shadow:0 2px 10px var(--shadow);
  transition:all .28s;
  cursor:pointer;
}
.gallery-card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 36px var(--shadow-md);
  border-color:var(--terra-light);
}

/* 이미지 영역 */
.gallery-img-wrap{
  width:100%;
  aspect-ratio:16/10;
  overflow:hidden;
  position:relative;
  background:var(--cream-deeper);
}
.gallery-img-wrap img,
.gallery-img-wrap svg{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .45s ease;
  display:block;
}
.gallery-img-wrap svg{height:100%;}
.gallery-card:hover .gallery-img-wrap img{
  transform:scale(1.04);
}
.gallery-img-badge{
  position:absolute;top:14px;left:14px;
  background:rgba(22,46,74,.78);
  color:#fff;font-size:.72rem;font-weight:700;
  padding:5px 11px;border-radius:20px;letter-spacing:.4px;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);
}
.gallery-ep-link{
  position:absolute;bottom:14px;right:14px;
  background:rgba(184,85,48,.88);
  color:#fff;font-size:.75rem;font-weight:700;
  padding:6px 13px;border-radius:20px;
  text-decoration:none;letter-spacing:.3px;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);
  transition:background .2s;
}
.gallery-ep-link:hover{background:var(--terra-dark)}

/* 카드 본문 */
.gallery-card-body{padding:22px 24px 26px}
.gallery-card-title{
  font-size:1.12rem;font-weight:700;color:var(--navy);
  margin-bottom:6px;line-height:1.4;
}
.gallery-card-sub{
  font-size:.78rem;color:var(--text-muted);
  margin-bottom:14px;font-weight:500;letter-spacing:.3px;
}
.gallery-card-desc{
  font-family:'Noto Serif KR',serif;
  font-size:.94rem;line-height:1.95;color:var(--text-sub);
  border-top:1px solid var(--border-light);
  padding-top:14px;
}

/* 라이트박스 */
.lightbox{
  position:fixed;inset:0;z-index:9000;
  background:rgba(10,18,30,.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  padding:20px;
}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox-inner{
  position:relative;max-width:900px;width:100%;
  background:var(--bg-card);border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.94);transition:transform .25s;
}
.lightbox.open .lightbox-inner{transform:scale(1)}
.lightbox-img{width:100%;display:block;max-height:70vh;object-fit:contain;background:var(--cream-deeper)}
.lightbox-svg{width:100%;display:block;max-height:70vh;background:var(--cream-deeper);overflow:hidden}
.lightbox-svg svg{width:100%;height:100%;display:block}
.lightbox-caption{padding:20px 24px 22px}
.lightbox-caption h3{font-size:1.08rem;color:var(--navy);margin-bottom:4px}
.lightbox-caption p{font-size:.88rem;color:var(--text-light);line-height:1.7}
.lightbox-caption .lightbox-ep-link{
  display:inline-block;margin-top:12px;
  padding:8px 18px;background:var(--terra);color:#fff;
  border-radius:20px;font-size:.82rem;font-weight:700;
  text-decoration:none;transition:background .2s;
}
.lightbox-caption .lightbox-ep-link:hover{background:var(--terra-dark)}
.lightbox-close{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;
  font-size:1.1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1.5px solid rgba(255,255,255,.25);
  transition:background .2s;
}
.lightbox-close:hover{background:rgba(0,0,0,.8)}

/* 빈 상태 */
.empty-soon{
  text-align:center;padding:60px 20px;color:var(--text-muted);
}
.empty-soon .empty-icon{font-size:3rem;margin-bottom:16px}
.empty-soon h4{color:var(--navy);margin-bottom:8px}

@media(max-width:480px){
  .gallery-card-body{padding:16px 16px 20px}
  .gallery-card-title{font-size:1rem}
  .gallery-card-desc{font-size:.88rem}
}
</style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="page-hero">
  <div class="container">
    <span class="badge badge-gold" style="margin-bottom:12px">🎨 <span id="totalCount">1</span>점 수록</span>
    <h1>그림 이야기</h1>
    <p>각 에피소드를 위해 만들어진 그림들을 모아 봅니다.<br>논리와 감성이 수채화 한 장 안에 함께 담겼습니다.</p>
  </div>
</div>

<!-- 필터 -->
<div class="filter-bar">
  <div class="container">
    <div class="filter-inner">
      <button class="filter-btn active" data-filter="all"   onclick="filterTag('all',this)">전체</button>
      <button class="filter-btn"        data-filter="cover" onclick="filterTag('cover',this)">표지·메인</button>
      <div class="filter-divider"></div>
      <button class="filter-btn"        data-filter="1"     onclick="filterTag('1',this)">1부 첫만남</button>
      <button class="filter-btn"        data-filter="2"     onclick="filterTag('2',this)">2부 연애</button>
      <button class="filter-btn"        data-filter="3"     onclick="filterTag('3',this)">3부 결혼</button>
      <button class="filter-btn"        data-filter="4"     onclick="filterTag('4',this)">4부 생활</button>
      <button class="filter-btn"        data-filter="5"     onclick="filterTag('5',this)">5부 중년</button>
      <button class="filter-btn"        data-filter="6"     onclick="filterTag('6',this)">6부 노년</button>
    </div>
  </div>
</div>

<!-- 갤러리 본문 -->
<section class="gallery-section">
  <div class="container">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-soon hidden" id="emptyState">
      <div class="empty-icon">🖌️</div>
      <h4>해당 그림이 아직 없습니다</h4>
      <p>새로운 그림이 곧 추가될 예정입니다.</p>
    </div>
  </div>
</section>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img class="lightbox-img hidden" id="lightboxImg" src="" alt="">
    <div class="lightbox-svg hidden" id="lightboxSvg"></div>
    <div class="lightbox-caption">
      <h3 id="lightboxTitle"></h3>
      <p id="lightboxDesc"></p>
      <a class="lightbox-ep-link hidden" id="lightboxEpLink" href="#">에피소드 읽기 →</a>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="auth-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/common.js"></script>
<script>
// ── 에피소드별 그림 설명 ──
const EP_DESCS = {
  1:  '미술관 계단 앞, 시계를 보는 공대생과 하늘을 바라보는 미대생. 가을 햇살이 건물 기둥에 내려앉는 오후 3시, 두 세계가 처음 마주쳤다.',
  2:  '노을빛이 건물 모서리에 걸린 오후의 골목. 20분이라는 숫자와 "노을이 예뻤어요"라는 말 사이의 거리만큼 두 사람은 달랐다.',
  3:  '카페 카운터 앞, 같은 메뉴판에서 전혀 다른 방식으로 커피를 주문하는 두 사람. 같은 잔 안에 담긴 다른 언어.',
  4:  '창가 자리의 두 잔, 그리고 서로 다른 방향으로 향하는 시선. "왜"와 "어때"가 같은 테이블 위에서 처음 부딪혔다.',
  5:  '박물관 유리 진열장 앞. 한 사람은 설명 패널을 읽고, 한 사람은 수천 년을 넘어온 색깔에 눈을 맞춘다.',
  6:  '가로수 사이로 내리는 오후 빛. 그가 처음으로 하늘에게 "어때?"라고 물었고, 그녀의 대답이 그의 눈을 바꾸었다.',
  7:  '가로수길을 걷는 두 사람. 한 명은 지도를 들고, 한 명은 한쪽으로 기울어진 나무를 바라본다. 계획에 없던 나무가 기억에 남았다.',
  8:  '스케치북 앞에서 멈춘 두 사람. 논리적으로 맞는 말이 감성에 상처가 될 수 있다는 것을, 그는 그날 처음 알았다.',
  9:  '카페 창가, 동시에 터진 웃음. 이유는 달랐지만 타이밍은 같았다. 다른 것이 같은 결과를 만드는 첫 번째 순간.',
  10: '갈림길 앞의 두 사람. 지도의 길과 느낌의 길 중 하나를 택했고, 가지 않은 골목이 더 오래 마음에 남았다.',
  11: '엑셀 화면을 가리키는 노트북과, 웃음을 참는 그녀. 세 개의 시트 안에 담긴 건 데이터가 아니라 마음이었다.',
  12: '기차역 광장과 그 앞 시장. 계획표에 없던 어묵 한 개가, 그날 여행 전체보다 오래 기억에 남았다.',
  13: '카메라를 든 두 손. 구도를 잡는 3초와 셔터를 누르는 0.5초. 기울어진 사진 안에 살아 있는 순간이 담겼다.',
  14: '카페 창밖 교차로. 교통 흐름을 보는 눈과 신호등 빨강의 온도를 보는 눈이 같은 유리창 너머를 향한다.',
  15: '마트 사과 진열대 앞, 두 개의 다른 빨강. 홍옥과 후지—같은 이름의 색이 얼마나 다른지를 알게 된 날.',
  16: '카페 창가의 노트북 화면, 엑셀 표. 마지막 항목 "측정 불가"에 붙은 별표 하나가 모든 논리를 무너뜨렸다.',
  17: '생일 포장지 위의 보조 배터리와, 책상 위에 올린 팔레트. 쓸모와 아름다움이 나란히 놓인 첫 생일.',
  18: '냄비 손잡이를 동시에 잡은 두 손. 계량컵과 눈대중, 오차가 있어도 그릇을 깨끗이 비웠다.',
  19: '소개팅 테이블, 창밖을 보는 시선. 밥 먹는 내내 다른 사람을 생각했다는 것—그게 데이터였다.',
  20: '카페 커피잔과 열린 노트. 10년 계획의 첫 번째 항목에 이름 하나가 적혔다.',
  21: '식당 창가, 반지와 두 손. 182일 준비 끝에 나온 한 글자 "응"이 모든 스프레드시트보다 정확했다.',
  22: '웨딩드레스 매장의 흰색들. 아이보리, 오프화이트, 샴페인—색에도 온도가 있다는 것을 처음 알게 된 날.',
  23: '스케치북 위의 수채화 드로잉—두 사람이 나란히 걷는 그림. 설렘은 이렇게 인쇄된다.',
  24: '파란 소파에 내려앉는 오후 빛. 효율과 아름다움이 한 가구 안에서 만났다.',
  25: '프라하 골목, 돌바닥 위의 두 그림자. 강수 확률 23%의 날, 예측 밖 골목에서 빛이 가장 예뻤다.',
  26: '버진 로드 끝에 서 있는 두 사람. 체크리스트가 전부 사라지고, 그냥 그녀만 보인 순간.',
  27: '나란히 펼쳐진 두 장의 서약서—한 장은 수치와 조건, 한 장은 감각과 약속. 두 언어가 하나로 묶였다.',
  28: '새 천장, 새 어둠 속에서 잡은 두 손. 낯선 집에서 낯설지 않은 숨소리만 있었다.',
  29: '두 가족의 식탁 사이에 선 두 사람. 감성과 논리 사이의 통역사—그 역할이 어느 순간 자연스러워졌다.',
  30: '1주년 기념 레스토랑, 같은 테이블. 정확한 시간과 기억 속의 떨림이 한 자리에서 마주쳤다.',
  31: '두 개의 아침 커피잔. 7시의 커피와 7시 33분에 식는 온도—계획표에 없던 항목이 매일 반복됐다.',
  32: '마트 카트 안의 보라 양배추. 목록에 없는 색깔 하나가 그주 내내 식탁을 화사하게 했다.',
  33: '긁힌 자국이 있는 빈티지 의자. 보강된 다리와 살아남은 세월—안전하고도 아름다운 첫 번째 공동 작업.',
  34: '두 개의 가계부—엑셀 화면과 노트 한 페이지. "커피 × 6 = 봄"이라고 쓴 노트가 더 정확한 기록이었다.',
  35: '마주 앉은 두 사람, 무거운 침묵. "서운했어?" 그 한마디가 논리의 언어보다 먼저 도착했다.',
  36: '긴 식탁, 여섯 명의 사람들. 공학과 예술이 한 테이블에서 서로의 기하학을 발견한 밤.',
  37: '아이의 작은 손가락이 아버지의 손가락을 감싼 순간. 수치로 설명된 작음이 주는 설명 불가의 감각.',
  38: '아이가 파란 크레용을 쥐고 있는 손. 발달 기준표와 색깔의 감성—두 세계가 함께 물려진다.',
  39: '담벼락 이끼 앞에 선 세 사람. 동선 계획이 개미 한 마리에게 무너지고, 더 좋은 장면이 남았다.',
  40: '빨래를 개는 손과 설거지를 하며 노래하는 모습. 효율 협상이 끝난 자리에 정성이 들어섰다.',
  41: '두 그릇의 저녁 식사, 넓어진 식탁. 돌아간 건지 새로 시작하는 건지—그 경계에서 반찬을 올려줬다.',
  42: '스프레드시트 화면 옆의 새 스케치북. 수입 칸을 비워둔 그림 시간이 계획표의 첫 항목이 됐다.',
  43: '리스본 골목, 지도를 접는 남자의 뒷모습. 계획 없는 여행에서 처음으로 두 사람이 같은 속도로 걸었다.',
  44: '건강검진 결과지와 의사의 표정. 숫자와 표정을 합쳐야 전체 그림이 나오는 두 사람의 건강 통역.',
  45: '같은 테이블의 수채화와 설계 스케치. 각자 다른 것을 하는 그 조용함이 둘 다 좋았다.',
  46: '느린 산책로의 이끼 담벼락과 작은 고양이. 지도를 벗어난 골목에서만 보이는 것들이 있었다.',
  47: '오래된 스케치북과 상상 속의 집 설계도. 청춘은 숫자가 아니라 그려두었던 그것들에 있었다.',
  48: '병원 스케줄표와 전화기. 특별한 이유 없이 걸린 전화 한 통이 모든 언어보다 컸다.',
  49: '25주년 기념 편지지와 두 잔의 차. 이해 없이도 사랑할 수 있다는 것—처음 고백보다 더 정확한 고백.',
  50: '수채화 한 장—미술관 앞 노년의 두 사람. 아직 오지 않은 50주년 풍경을 그녀가 먼저 그렸다.',
  51: '세루리안 블루 하늘 아래 나란히 걷는 두 사람. 50년 만에 하늘이 보이기 시작했다.',
  52: '손자의 작은 손을 잡은 두 노인의 손. 세상이 이렇게 이어지고 있다는 것을 느낀 날.',
  53: '나란히 놓인 연도별 기록과 수채화 스케치. 한 인생을 두 사람이 기록할 수 있다는 것.',
  54: '오래된 계량컵이 놓인 부엌 선반. 첫 카레의 기억이 달린 물건은 버릴 수 없었다.',
  55: '병원 복도의 긴 의자. 말 없이 앉아 기다린 시간—그것이 때로 모든 언어보다 컸다.',
  56: '펼쳐진 사진첩, 나란히 앉은 두 사람. 같은 사진을 다르게 기억하는 두 눈이 합쳐져야 완성됐다.',
  57: '아이슬란드의 오로라 하늘 아래 두 실루엣. 스프레드시트에 "계획 없는 날 2일"이 적힌 여행.',
  58: '손으로 쓴 편지지와 봉투. 50년 만에 쓴 첫 편지—"딱 지금이야"라는 한마디로 충분했다.',
  59: '미술관 계단, 오후 3시의 빛. 50년 전과 같은 자리, 이번엔 시계 대신 그녀를 보고 있었다.',
  60: '아침 창가, 시계와 하늘. 각자 다른 것을 보며 살았지만, 어느 순간 서로의 것을 함께 보게 됐다.',
};

// ── 갤러리 데이터 생성 ──
const GALLERY_COVER = [{
  id: 0,
  tag: 'cover',
  ep: null,
  part: 0,
  title: '함께 걷는 길',
  sub: '표지 그림 · 2026',
  src: '1. 자료/ChatGPT Image 2026년 3월 15일 오후 01_01_17.png',
  svgMode: false,
  epLink: null,
  epLabel: null,
  desc: '가을 공원 산책로를 나란히 걷는 두 사람. 남자는 어깨에 설계 도면을 들었고, 여자는 물감이 튄 원피스에 꽃다발을 안았다. 두 사람은 다른 것을 들고, 다른 것을 보며 살아왔지만 손은 꼭 맞잡혀 있다. 그것이 이 부부 40년의 이야기다.'
}];

function buildEpisodeGallery() {
  return SAMPLE_EPISODES.map(ep => {
    const epNum = ep.episode_number;
    const illus = ILLUSTRATIONS[epNum] || ILLUSTRATIONS.default;
    return {
      id: epNum,
      tag: 'ep',
      ep: epNum,
      part: ep.part_number,
      title: ep.title,
      sub: `EP.${epNum} · ${getPartName(ep.part_number)}`,
      src: null,
      svgMode: true,
      epLink: `episode-detail.html?id=${ep.id}`,
      epLabel: `EP.${epNum} 읽기`,
      desc: EP_DESCS[epNum] || illus.caption || ep.summary,
      illusCaption: illus.caption || '',
    };
  });
}

const GALLERY = [...GALLERY_COVER, ...buildEpisodeGallery()];

let currentFilter = 'all';

function filterTag(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function getFiltered() {
  if (currentFilter === 'all') return GALLERY;
  if (currentFilter === 'cover') return GALLERY.filter(g => g.tag === 'cover');
  const part = parseInt(currentFilter);
  return GALLERY.filter(g => g.part === part);
}

function galleryCard(g) {
  const imgHtml = g.svgMode
    ? `<img src="${getIllustrationDataURI(g.ep)}" alt="${g.title}" loading="lazy">`
    : `<img src="${g.src}" alt="${g.title}" loading="lazy">`;
  const badge = g.tag === 'cover' ? '표지·메인' : `EP.${g.ep}`;
  return `
  <div class="gallery-card" onclick="openLightbox(${g.id})">
    <div class="gallery-img-wrap">
      ${imgHtml}
      <span class="gallery-img-badge">${badge}</span>
      ${g.epLink ? `<a class="gallery-ep-link" href="${g.epLink}" onclick="event.stopPropagation()">${g.epLabel}</a>` : ''}
    </div>
    <div class="gallery-card-body">
      <div class="gallery-card-title">${g.title}</div>
      <div class="gallery-card-sub">${g.sub}</div>
      <p class="gallery-card-desc">${g.desc}</p>
    </div>
  </div>`;
}

function renderGallery() {
  const grid  = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyState');
  const list  = getFiltered();
  document.getElementById('totalCount').textContent = GALLERY.length - 1; // 표지 제외 에피소드 수
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = list.map(galleryCard).join('');
  }
}

// ── 라이트박스 ──
function openLightbox(id) {
  const g = GALLERY.find(x => x.id === id);
  if (!g) return;
  const lbImg = document.getElementById('lightboxImg');
  const lbSvg = document.getElementById('lightboxSvg');
  const lbLink = document.getElementById('lightboxEpLink');
  if (g.svgMode) {
    const illus = ILLUSTRATIONS[g.ep] || ILLUSTRATIONS.default;
    lbImg.classList.add('hidden');
    lbSvg.classList.remove('hidden');
    lbSvg.innerHTML = illus.svg;
  } else {
    lbSvg.classList.add('hidden');
    lbImg.classList.remove('hidden');
    lbImg.src = g.src;
    lbImg.alt = g.title;
  }
  document.getElementById('lightboxTitle').textContent = g.illusCaption || g.title;
  document.getElementById('lightboxDesc').textContent  = g.desc;
  if (g.epLink) {
    lbLink.href = g.epLink;
    lbLink.textContent = `${g.epLabel} →`;
    lbLink.classList.remove('hidden');
  } else {
    lbLink.classList.add('hidden');
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

renderGallery();
</script>
</body>
